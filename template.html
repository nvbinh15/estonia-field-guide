<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Estonian Anomaly — how 1.3 million people built a tech nation</title>
    <meta
      name="description"
      content="A photographic, sourced field guide to how Estonia — a country of ~1.3 million — built the most startup-dense, most digital, fastest-AI-adopting nation in Europe. And where the story is hyped."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23101317'/%3E%3Crect x='4' y='6' width='24' height='6.4' rx='2' fill='%234891d9'/%3E%3Crect x='4' y='12.8' width='24' height='6.4' fill='%23f4f1ea'/%3E%3Crect x='4' y='19.6' width='24' height='6.4' rx='2' fill='%23e9edf0'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --paper: #f5f3ee;
        --panel: #fdfcfa;
        --ink: #14161a;
        --ink-2: #2b2f36;
        --muted: #565d66;
        --faint: #60666d;
        --rule: #dedacf;
        --rule-soft: #eae7de;
        --accent: #0a9fb4;
        --accent-deep: #086d7e;
        --accent-soft: #e2f1f3;
        --warn: #8f6210;
        --warn-soft: #f4ecd9;
        --grey: #7e8893;
        --dark: #101317;
        --dark-panel: #1a1e24;
        --dark-rule: #2a2f37;
        --dark-text: #e8e6e0;
        --dark-muted: #9aa1a9;
        --maxw: 1200px;
        --col: 630px;
        --nav-h: 54px;
        --shadow: 0 1px 2px rgba(16, 19, 23, 0.05), 0 10px 32px rgba(16, 19, 23, 0.07);
      }
      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      :focus-visible {
        outline: 2px solid var(--accent-deep);
        outline-offset: 2px;
        border-radius: 4px;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 17px;
        line-height: 1.66;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      h1, h2, h3, h4 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 500;
        line-height: 1.04;
        letter-spacing: -0.01em;
        text-wrap: balance;
        margin: 0;
        font-variation-settings: "opsz" 96;
      }
      p {
        text-wrap: pretty;
      }
      a {
        color: inherit;
      }
      img {
        display: block;
        max-width: 100%;
      }
      .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--faint);
        font-weight: 500;
      }
      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 32px;
      }
      .col {
        max-width: var(--col);
      }

      /* ---------- progress + nav ---------- */
      #progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        width: 0;
        background: var(--accent);
        z-index: 60;
      }
      nav {
        position: sticky;
        top: 0;
        z-index: 50;
        height: var(--nav-h);
        display: flex;
        align-items: center;
        gap: 18px;
        background: color-mix(in srgb, var(--paper) 88%, transparent);
        backdrop-filter: saturate(1.3) blur(12px);
        border-bottom: 1px solid var(--rule);
        padding: 0 24px;
      }
      .brand {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 16px;
        white-space: nowrap;
        letter-spacing: -0.01em;
      }
      .brand i {
        font-style: normal;
        color: var(--accent-deep);
      }
      .navlinks {
        display: flex;
        gap: 2px;
        margin-left: 8px;
        overflow: hidden;
      }
      .navlinks a {
        text-decoration: none;
        color: var(--muted);
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 7px;
        white-space: nowrap;
        transition: background 0.15s, color 0.15s;
      }
      .navlinks a:hover {
        background: var(--rule-soft);
        color: var(--ink);
      }
      .navlinks a.on {
        color: var(--accent-deep);
        background: var(--accent-soft);
      }
      .navright {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 12px;
        white-space: nowrap;
      }
      #now {
        font-size: 11.5px;
        color: var(--faint);
        font-family: "JetBrains Mono", monospace;
      }
      #now b {
        color: var(--ink);
        font-weight: 500;
      }
      .idxbtn {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        letter-spacing: 0.06em;
        border: 1px solid var(--rule);
        background: var(--panel);
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }
      .idxbtn:hover {
        border-color: var(--accent);
        color: var(--accent-deep);
      }

      /* ---------- right rail ---------- */
      #rail {
        position: fixed;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 40;
        display: flex;
        flex-direction: column;
        gap: 13px;
      }
      #rail .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: 1.5px solid var(--grey);
        background: transparent;
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
        padding: 0;
      }
      #rail .dot.done {
        background: var(--grey);
      }
      #rail .dot.on {
        border-color: var(--accent-deep);
        background: var(--accent-deep);
        box-shadow: 0 0 0 4px var(--accent-soft);
        transform: scale(1.2);
      }
      #rail .dot:hover::after {
        content: attr(data-label);
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--ink);
        color: #fff;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        padding: 4px 9px;
        border-radius: 6px;
        white-space: nowrap;
      }

      /* ---------- index panel ---------- */
      #scrim {
        position: fixed;
        inset: 0;
        background: rgba(16, 19, 23, 0.4);
        z-index: 70;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #scrim.open {
        opacity: 1;
        pointer-events: auto;
      }
      #indexPanel {
        position: fixed;
        top: 0;
        right: 0;
        height: 100%;
        width: min(380px, 88vw);
        background: var(--panel);
        z-index: 80;
        transform: translateX(100%);
        transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto;
        box-shadow: var(--shadow);
        padding: 28px 28px 64px;
      }
      #indexPanel.open {
        transform: translateX(0);
      }
      #indexPanel h4 {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--faint);
        font-weight: 500;
        margin: 24px 0 8px;
      }
      #indexPanel a {
        display: flex;
        gap: 10px;
        align-items: baseline;
        text-decoration: none;
        color: var(--ink);
        padding: 6px 8px;
        border-radius: 7px;
        font-size: 14px;
      }
      #indexPanel a:hover {
        background: var(--rule-soft);
      }
      #indexPanel a .n {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--faint);
        min-width: 20px;
      }
      #indexPanel a.sub {
        font-size: 13px;
        color: var(--muted);
        padding-left: 30px;
      }
      .closebtn {
        position: absolute;
        top: 14px;
        right: 16px;
        border: none;
        background: none;
        font-size: 22px;
        cursor: pointer;
        color: var(--muted);
        line-height: 1;
        padding: 6px 10px;
        border-radius: 8px;
      }
      .closebtn:hover {
        color: var(--ink);
        background: var(--rule-soft);
      }

      /* ---------- COVER ---------- */
      .cover {
        background: var(--dark);
        position: relative;
        min-height: max(640px, 96svh);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        color: #f2f1ed;
        overflow: hidden;
      }
      .cover img.bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.92) contrast(1.04);
      }
      .cover::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(16, 19, 23, 0.42) 0%, rgba(16, 19, 23, 0.12) 38%, rgba(16, 19, 23, 0.62) 74%, rgba(16, 19, 23, 0.88) 100%);
      }
      .cover .inner {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 32px 36px;
      }
      .cover .kick {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #b9d9de;
        margin-bottom: 18px;
        text-shadow: 0 1px 12px rgba(16, 19, 23, 0.45);
      }
      .cover h1 {
        font-size: clamp(52px, 9.6vw, 128px);
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: 0.96;
        color: #f7f6f2;
        max-width: 12ch;
        font-variation-settings: "opsz" 144;
      }
      .cover .dek {
        font-family: "Fraunces", serif;
        font-size: clamp(18px, 2.4vw, 24px);
        font-weight: 400;
        font-style: italic;
        color: #d8d5cd;
        max-width: 52ch;
        margin: 22px 0 0;
        line-height: 1.4;
      }
      .cover .coverstats {
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        margin-top: 38px;
        border-top: 1px solid rgba(242, 241, 237, 0.25);
      }
      .cover .cstat {
        flex: 1 1 150px;
        padding: 18px 26px 4px 0;
      }
      .cover .cstat .v {
        font-family: "Fraunces", serif;
        font-size: clamp(28px, 3.6vw, 44px);
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #fff;
      }
      .cover .cstat .k {
        font-size: 12.5px;
        color: #b9bcb6;
        margin-top: 2px;
      }
      .cover .cstat .k a {
        color: inherit;
        text-decoration: none;
      }
      .cover .credit,
      figure .fcredit {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.06em;
        color: rgba(242, 241, 237, 0.85);
      }
      .cover .credit {
        position: absolute;
        right: 16px;
        bottom: 10px;
        z-index: 3;
      }
      .scrollcue {
        position: absolute;
        left: 50%;
        bottom: 220px;
        transform: translateX(-50%);
        z-index: 2;
        color: rgba(247, 246, 242, 0.7);
        font-size: 22px;
        animation: cue 2.2s ease-in-out infinite;
      }
      @keyframes cue {
        0%, 100% { transform: translate(-50%, 0); opacity: 0.55; }
        50% { transform: translate(-50%, 8px); opacity: 1; }
      }

      /* ---------- contents strip ---------- */
      .toc {
        border-bottom: 1px solid var(--rule);
        background: var(--panel);
      }
      .toc .row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        max-width: var(--maxw);
        margin: 0 auto;
      }
      .toc a {
        text-decoration: none;
        padding: 18px 16px 16px;
        border-left: 1px solid var(--rule-soft);
        transition: background 0.15s;
      }
      .toc a:first-child {
        border-left: none;
      }
      .toc a:hover {
        background: var(--accent-soft);
      }
      .toc .n {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        color: var(--accent-deep);
        letter-spacing: 0.1em;
      }
      .toc .t {
        font-family: "Fraunces", serif;
        font-weight: 500;
        font-size: 15.5px;
        color: var(--ink);
        margin-top: 4px;
        line-height: 1.15;
      }

      /* ---------- chapters ---------- */
      section.chapter {
        padding: 84px 0 72px;
        scroll-margin-top: var(--nav-h);
      }
      section.chapter + section.chapter {
        border-top: 1px solid var(--rule);
      }
      .chead {
        display: flex;
        align-items: baseline;
        gap: 22px;
        margin-bottom: 14px;
      }
      .chead .cnum {
        font-family: "Fraunces", serif;
        font-size: clamp(44px, 6vw, 76px);
        font-weight: 300;
        color: transparent;
        -webkit-text-stroke: 1.2px var(--accent-deep);
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .chead h2 {
        font-size: clamp(34px, 5vw, 58px);
        font-weight: 550;
        letter-spacing: -0.02em;
      }
      .cdek {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: clamp(17px, 2vw, 21px);
        color: var(--muted);
        max-width: 58ch;
        margin: 4px 0 44px;
        line-height: 1.45;
      }

      /* ---------- prose ---------- */
      .prose p {
        margin: 0 0 1.1em;
        color: var(--ink-2);
      }
      .lede p:first-child {
        font-size: 19.5px;
        line-height: 1.6;
      }
      .lede p:first-child::first-letter {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 74px;
        line-height: 0.78;
        float: left;
        padding: 8px 12px 0 0;
        color: var(--accent-deep);
      }

      /* ---------- figures ---------- */
      figure {
        margin: 0;
      }
      figure.photo img {
        width: 100%;
        border-radius: 4px;
        filter: saturate(0.9) contrast(1.03);
      }
      figure.photo figcaption {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 10px 2px 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
      }
      figure.photo .fcredit {
        color: var(--faint);
        white-space: nowrap;
        padding-top: 2px;
      }
      .break {
        position: relative;
        margin: 0;
        height: min(78vh, 720px);
        overflow: hidden;
      }
      .break img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(0.88) contrast(1.05);
      }
      .break figcaption {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 60px 32px 18px;
        background: linear-gradient(180deg, transparent, rgba(16, 19, 23, 0.85));
        color: #e8e6e0;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        gap: 18px;
      }
      .break .fcredit {
        color: rgba(232, 230, 224, 0.9);
      }

      /* ---------- pull quote ---------- */
      blockquote.pq {
        margin: 44px 0;
        padding: 0;
        border: none;
        position: relative;
      }
      blockquote.pq::before {
        content: "“";
        font-family: "Fraunces", serif;
        font-size: 3.4em;
        font-weight: 600;
        color: var(--accent);
        position: absolute;
        left: -0.06em;
        top: -0.32em;
        opacity: 0.55;
      }
      blockquote.pq p {
        font-family: "Fraunces", serif;
        font-size: clamp(23px, 2.8vw, 31px);
        font-weight: 450;
        font-style: italic;
        line-height: 1.3;
        letter-spacing: -0.01em;
        color: var(--ink);
        margin: 0;
        padding-left: 34px;
        max-width: 30ch;
      }
      blockquote.pq cite {
        display: block;
        margin-top: 14px;
        padding-left: 34px;
        font-style: normal;
        font-size: 12px;
        color: var(--faint);
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 0.04em;
      }
      blockquote.pq cite a {
        color: inherit;
      }

      /* ---------- force spreads ---------- */
      .force {
        padding: 64px 0 56px;
        border-top: 1px solid var(--rule);
      }
      .force:first-of-type {
        border-top: none;
        padding-top: 12px;
      }
      .fhead {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 26px;
        align-items: baseline;
        margin-bottom: 10px;
      }
      .fhead .fnum {
        font-family: "Fraunces", serif;
        font-size: 54px;
        font-weight: 300;
        color: var(--accent-deep);
        line-height: 1;
      }
      .fhead .fkick {
        grid-column: 2;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      .fhead h3 {
        grid-column: 2;
        font-size: clamp(28px, 3.6vw, 44px);
        font-weight: 550;
        letter-spacing: -0.015em;
      }
      .force .thesis {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: clamp(17px, 2vw, 20.5px);
        color: var(--muted);
        margin: 14px 0 34px;
        max-width: 56ch;
        line-height: 1.45;
      }
      .fgrid {
        display: grid;
        grid-template-columns: minmax(0, var(--col)) 280px;
        gap: 24px 64px;
        align-items: start;
      }
      .frail {
        position: sticky;
        top: calc(var(--nav-h) + 24px);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .frail .rlabel {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--faint);
        padding-bottom: 2px;
        border-bottom: 1px solid var(--rule);
      }
      .stat {
        padding: 10px 0 12px;
        border-bottom: 1px solid var(--rule-soft);
      }
      .stat .v {
        font-family: "Fraunces", serif;
        font-size: 30px;
        font-weight: 550;
        letter-spacing: -0.02em;
        display: flex;
        align-items: baseline;
        gap: 8px;
        line-height: 1.05;
      }
      .stat .k {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 4px;
      }
      .stat .cmp {
        font-size: 11.5px;
        color: var(--faint);
        margin-top: 2px;
      }
      .stat .src-row {
        margin-top: 7px;
      }
      .force figure.photo {
        margin: 36px 0 8px;
      }
      .catch {
        margin: 38px 0 0;
        background: var(--warn-soft);
        border-radius: 6px;
        padding: 22px 26px 18px;
        position: relative;
      }
      .catch::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--warn);
        border-radius: 6px 0 0 6px;
      }
      .catch .label {
        color: var(--warn);
        display: block;
        margin-bottom: 8px;
      }
      .catch p {
        margin: 0 0 0.7em;
        font-size: 15px;
        color: var(--ink-2);
      }
      .catch p:last-child {
        margin-bottom: 0;
      }
      .bigzero {
        font-family: "Fraunces", serif;
        font-weight: 300;
        font-size: clamp(120px, 20vw, 260px);
        line-height: 0.9;
        color: transparent;
        -webkit-text-stroke: 1.5px var(--accent-deep);
        text-align: center;
        margin: 30px 0 6px;
        user-select: none;
      }
      .bigzero small {
        font-size: 0.34em;
        -webkit-text-stroke: 1px var(--accent-deep);
      }

      .force:nth-of-type(even) .fgrid {
        grid-template-columns: 280px minmax(0, var(--col));
      }
      .force:nth-of-type(even) .fgrid aside {
        order: -1;
      }

      /* ---------- confidence + sources ---------- */
      .cdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        flex: none;
        transform: translateY(-1px);
      }
      .cdot.verified { background: var(--accent); }
      .cdot.secondary { background: #c9921a; }
      .cdot.reported { background: var(--grey); }
      .src {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--rule);
        border-radius: 999px;
        padding: 2px 9px;
        transition: border-color 0.15s, color 0.15s;
        background: var(--panel);
      }
      .src:hover {
        border-color: var(--accent);
        color: var(--accent-deep);
      }
      .srclist {
        display: grid;

      .srclist .st {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;

        border-radius: 5px;
        padding: 2px 6px;
        flex: none;
      }
      .srclist .sx { min-width: 0; }
      .srclist .sttl {
        font-weight: 500;
        font-size: 14px;
        color: var(--ink);

      .srclist .swhy {
        font-size: 12.5px;
        color: var(--muted);

      }
      .srclist .spub {
        font-size: 11px;

      /* ---------- dark numbers band ---------- */
      section.dark {
        background: var(--dark);

      .dark .chead .cnum {

      .chartwrap {
        margin: 8px 0 56px;

      }
      .chartwrap .bar {
        display: grid;
        grid-template-columns: 110px 1fr 64px;
        gap: 14px;
        align-items: center;
        margin: 14px 0;
      }
      .chartwrap .bn {

        color: var(--dark-text);
        text-align: right;

      }
      .chartwrap .bt {

        border-radius: 3px;

        overflow: hidden;
      }
      .chartwrap .bf {
        position: absolute;
        inset: 0 auto 0 0;
        background: linear-gradient(90deg, var(--accent-deep), var(--accent));
        border-radius: 3px;
      }
      .chartwrap .bar.dim .bf {
        background: #6a737e;

      .chartwrap .bv {
        font-family: "Fraunces", serif;
        font-size: 20px;

      }

      .chartnote {
        font-size: 12.5px;
        color: var(--dark-muted);

        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .dark .src {
        background: transparent;
        border-color: var(--dark-rule);
        color: var(--dark-muted);
      }
      .dark .src:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .metricwall {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 1px;
        background: var(--dark-rule);
        border: 1px solid var(--dark-rule);
        border-radius: 10px;
        overflow: hidden;
      }
      .metric {
        background: var(--dark);
        padding: 22px 22px 16px;
        display: flex;
        flex-direction: column;
        min-height: 168px;
      }
      .metric .v {
        font-family: "Fraunces", serif;
        font-size: 38px;
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1;
        color: #fff;
      }
      .metric .k {
        font-size: 13.5px;
        color: var(--dark-text);
        margin-top: 10px;
        font-weight: 500;
      }
      .metric .cmp {
        font-size: 12px;
        color: var(--dark-muted);
        margin-top: 3px;
      }
      .metric .foot {

        padding-top: 14px;

      .metric .asof {

      /* ---------- companies ---------- */
      .feature {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 56px;
        align-items: center;
        padding: 52px 0;
        border-top: 1px solid var(--rule);
      }
      .feature:first-of-type {
        border-top: none;
        padding-top: 16px;
      }
      .feature.flip .fmedia { order: 2; }
      .feature .fmedia img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        border-radius: 4px;
        filter: saturate(0.9) contrast(1.03);
      }
      .feature .ftxt .fco {
        font-size: clamp(30px, 3.4vw, 44px);
        font-weight: 550;
        letter-spacing: -0.015em;
        margin: 6px 0 2px;
      }
      .feature .ftag {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .feature .one {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 17.5px;
        color: var(--muted);
        margin: 10px 0 16px;
        line-height: 1.45;
      }
      .feature .fnums {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
        margin: 18px 0 6px;
      }
      .feature .fnums .stat {
        border-bottom: none;
        padding: 0;
        min-width: 110px;
      }
      .feature .morelink,
      .ledger .morelink {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        letter-spacing: 0.06em;
        color: var(--accent-deep);

        border: none;

        text-underline-offset: 3px;
      }
      .typogram {
        aspect-ratio: 4 / 3;
        border: 1px solid var(--rule);
        border-radius: 4px;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        overflow: hidden;
      }
      .typogram .big {
        font-family: "Fraunces", serif;
        font-weight: 300;
        font-size: clamp(54px, 7vw, 96px);
        letter-spacing: -0.03em;

        -webkit-text-stroke: 1.2px var(--accent-deep);

      .typogram .sub {

      .tag {

      .lhead:hover {

      .lhead .lco {
        font-family: "Fraunces", serif;
        font-weight: 550;
        font-size: 20px;

      .lhead .lone {
        font-size: 13.5px;
        color: var(--muted);
        line-height: 1.4;
      }
      .lhead .lmeta {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        color: var(--faint);

      .estonia {
        margin: 14px 0 18px;

      }
      .estonia .label {
        color: var(--accent-deep);

        display: block;
      }
      h4.mini {
        font-family: "JetBrains Mono", monospace;
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--faint);
        font-weight: 500;
        margin: 22px 0 8px;
      }
      .kn {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 28px;
        margin: 14px 0;
      }
      .kn .stat {
        border-bottom: none;
        padding: 4px 0;
        min-width: 120px;
      }
      .social {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .social a {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        text-decoration: none;
        color: var(--muted);
        border: 1px solid var(--rule);
        border-radius: 7px;
        padding: 4px 10px;
        background: var(--panel);
      }
      .social a:hover {
        border-color: var(--accent);
        color: var(--accent-deep);
      }

      /* ---------- founders ---------- */
      .fprofile {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px 56px;
        padding: 56px 0;
        border-top: 1px solid var(--rule);
        align-items: start;
      }
      .fprofile:first-of-type {
        border-top: none;
        padding-top: 16px;
      }
      .fprofile.flip .pmedia {
        order: 2;
      }
      .pmedia {
        position: sticky;
        top: calc(var(--nav-h) + 24px);
      }
      .pmedia img {
        width: 100%;
        aspect-ratio: 4 / 5;
        object-fit: cover;
        border-radius: 4px;
        filter: saturate(0.85) contrast(1.04);
      }
      .pmedia .fcredit {
        color: var(--faint);
        display: block;
        padding-top: 6px;
        text-align: right;
      }
      .monogram {
        width: 100%;
        aspect-ratio: 4 / 5;
        border-radius: 4px;
        background: linear-gradient(160deg, var(--accent-soft), #d3e8eb 60%, #c2dde2);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .monogram span {
        font-family: "Fraunces", serif;
        font-weight: 300;
        font-size: 110px;
        color: transparent;
        -webkit-text-stroke: 1.4px var(--accent-deep);
        letter-spacing: 0.02em;
      }
      .monogram i {
        position: absolute;
        bottom: 12px;
        left: 0;
        right: 0;
        text-align: center;
        font-style: normal;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-deep);
        opacity: 0.75;
      }
      .ptxt .prose,
      .ptxt blockquote.pq {
        max-width: var(--col);
      }
      .ptxt .pname {
        font-size: clamp(28px, 3.2vw, 40px);
        font-weight: 550;
        letter-spacing: -0.015em;
      }
      .ptxt .prole {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 16.5px;
        color: var(--muted);
        margin: 6px 0 4px;
        max-width: 54ch;
        line-height: 1.45;
      }
      .ptags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin: 12px 0 18px;
      }
      .ptags .tag {
        white-space: normal;
        line-height: 1.5;
      }
      .ptxt blockquote.pq {
        margin: 30px 0;
      }
      .ptxt blockquote.pq p {
        font-size: clamp(20px, 2.3vw, 25px);
        max-width: 40ch;
      }

      /* ---------- timeline ---------- */
      .timeline {
        margin-top: 30px;
        position: relative;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 92px;
        top: 6px;
        bottom: 6px;
        width: 1px;
        background: var(--rule);
      }
      .tnode {
        display: grid;
        grid-template-columns: 72px 40px minmax(0, 1fr);
        gap: 0;
        padding: 0 0 34px;
        position: relative;
      }
      .tnode .ty {
        font-family: "Fraunces", serif;
        font-weight: 550;
        color: var(--ink);
        font-size: 22px;
        text-align: right;
        line-height: 1.1;
      }
      .tnode .tdot {
        position: relative;
      }
      .tnode .tdot::before {
        content: "";
        position: absolute;
        left: 14px;
        top: 7px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--paper);
        border: 2px solid var(--accent-deep);
      }
      .tnode .tt {
        font-family: "Fraunces", serif;
        font-weight: 550;
        font-size: 19px;
        margin-bottom: 4px;
      }
      .tnode .tb {
        color: var(--muted);
        font-size: 14.5px;
        max-width: 60ch;
      }
      .tnode figure.photo {
        margin: 14px 0 4px;
        max-width: 420px;
      }
      .tnode figure.photo img {
        aspect-ratio: 16 / 10;
        object-fit: cover;
      }

      /* ---------- sources / credits / author ---------- */
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        margin: 4px 0 30px;
      }
      .legend .li {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }
      .credits {
        columns: 2;
        gap: 40px;
        font-size: 12px;
        color: var(--faint);
        line-height: 1.7;
        margin-top: 10px;
      }
      .credits a {
        color: var(--muted);
      }
      .author {
        background: var(--panel);
        border: 1px solid var(--rule);
        border-radius: 10px;
        padding: 28px 30px;
        margin-top: 14px;
      }
      .author .nm {
        font-family: "Fraunces", serif;
        font-weight: 550;
        font-size: 21px;
      }
      .author p {
        color: var(--muted);
        font-size: 14.5px;
        max-width: 60ch;
        margin: 10px 0 0;
      }
      .author .links {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      footer {
        padding: 44px 0 90px;
        color: var(--faint);
        font-size: 13px;
      }

      summary {
        list-style: none;
        cursor: pointer;
      }
      summary::-webkit-details-marker {
        display: none;
      }
      summary.label::before {
        content: "▸ ";
        color: var(--accent-deep);
      }
      details[open] summary.label::before {
        content: "▾ ";
      }
      .metric .v.small {
        font-size: 26px;
        line-height: 1.12;
      }
      .metric .det {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ---------- responsive ---------- */
      @media (max-width: 1020px) {
        .fgrid { grid-template-columns: 1fr; }
        .frail { position: static; flex-direction: row; flex-wrap: wrap; gap: 8px 28px; }
        .force:nth-of-type(even) .fgrid aside { order: 2; }
        .frail .rlabel { width: 100%; }
        .frail .stat { border-bottom: none; min-width: 130px; }
        .toc .row { grid-template-columns: repeat(4, 1fr); }
        .toc a:nth-child(n + 5) { border-top: 1px solid var(--rule-soft); }
      }
      @media (max-width: 860px) {
        body { font-size: 16px; }
        .navlinks, #rail { display: none; }
        .feature { grid-template-columns: 1fr; gap: 24px; }
        .feature.flip .fmedia { order: 0; }
        .fprofile { grid-template-columns: 1fr; gap: 20px; }
        .fprofile.flip .pmedia { order: 0; }
        .pmedia { position: static; max-width: 380px; }
        .lhead { grid-template-columns: 28px 1fr auto auto; }
        .lhead .lone { display: none; }
        .lbody { padding-left: 32px; }
        .timeline::before { left: 14px; }
        .tnode { grid-template-columns: 0 36px 1fr; }
        .tnode .ty { text-align: left; grid-column: 3; margin-bottom: 2px; }
        .tnode .tdot::before { left: 10px; }
        .toc .row { grid-template-columns: repeat(2, 1fr); }
        .toc a:nth-child(n + 3) { border-top: 1px solid var(--rule-soft); }
        .credits { columns: 1; }
        .scrollcue { display: none; }
        .cover .cstat { padding-right: 16px; }
      }
    </style>
  </head>
  <body>
    <div id="progress"></div>
    <nav>
      <span class="brand">The Estonian<i> Anomaly</i></span>
      <div class="navlinks" id="navlinks"></div>
      <div class="navright">
        <span id="now"></span>
        <button class="idxbtn" id="idxbtn">index</button>
      </div>
    </nav>

    <div id="rail"></div>

    <header class="cover" id="cover">
      <img class="bg" id="coverImg" alt="" />
            <div class="inner">
        <div class="kick" id="kicker"></div>
        <h1 id="title"></h1>
        <p class="dek" id="dek"></p>
        <div class="coverstats" id="coverstats"></div>
      </div>
      <span class="credit" id="coverCredit"></span>
    </header>

    <div class="toc"><div class="row" id="tocRow"></div></div>

    <main id="main"></main>

    <div id="scrim"></div>
    <aside id="indexPanel">
      <button class="closebtn" id="closeIdx" aria-label="close">×</button>
      <h4>contents</h4>
      <div id="idxContents"></div>
    </aside>

    <script id="data" type="application/json">
      __DATA__
    </script>
    <script>
      var DATA = JSON.parse(document.getElementById("data").textContent);

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function smart(s) {
        s = String(s == null ? "" : s);
        s = s.replace(/ -- /g, " — ").replace(/ - /g, " — ");
        s = s.replace(/"([^"]*)"/g, "“$1”");
        s = s.replace(/(\w)'(\w)/g, "$1’$2");
        s = s.replace(/'([^']*)'/g, "‘$1’");
        s = s.replace(/'/g, "’");
        return s;
      }
      function tx(s) { return esc(smart(s)); }
      function paras(s) {
        return String(s || "").split(/\n\n+/).map(function (x) { return x.trim(); }).filter(Boolean);
      }
      function proseHtml(s) {
        return paras(s).map(function (p) { return "<p>" + tx(p) + "</p>"; }).join("");
      }
      function hostLabel(url) {
        try { return new URL(url).hostname.replace(/^www\./, ""); } catch (e) { return "link"; }
      }
      function conf(c) {
        c = (c || "reported").toLowerCase();
        if (c.indexOf("verif") === 0) return "verified";
        if (c.indexOf("second") === 0) return "secondary";
        return "reported";
      }
      function cdot(c) {
        var k = conf(c);
        return '<span class="cdot ' + k + '" title="' + k + '"></span>';
      }
      function srcPill(url, txt) {
        if (!url) return "";
        return '<a class="src" href="' + esc(url) + '" target="_blank" rel="noopener">↗ ' + esc(txt || hostLabel(url)) + "</a>";
      }
      function yearNum(s) {
        var m = String(s || "").match(/\d{4}/);
        return m ? parseInt(m[0], 10) : 0;
      }
      function shortYear(s) {
        var m = String(s || "").match(/\b(?:19|20)\d{2}\b/);
        return m ? m[0] : String(s || "").trim().slice(0, 4) || "—";
      }
      function shortVal(s) {
        s = String(s || "");
        if (/not (publicly )?(disclosed|stated)|private|undisclosed|n\/a/i.test(s)) return "private";
        var m = s.match(/~?\s*(US\$|\$|€|£)\s?([\d][\d.,]*)\s*(billion|bn|b|million|mn|m)?/i);
        if (!m) return "—";
        var cur = m[1].replace(/US\$/i, "$");
        var num = m[2].replace(/,/g, "");
        var u = (m[3] || "").toLowerCase();
        var ul = /^b/.test(u) || /billion/.test(u) ? "B" : /^m/.test(u) ? "M" : "";
        return cur + num + ul;
      }

      // ---- images ----
      var IMG = {};
      ((DATA.images || {}).list || []).forEach(function (im) { IMG[im.slug] = im; });
      var SLOTS = (DATA.images || {}).slots || {};
      function figureHtml(slug, opts) {
        var im = IMG[slug];
        if (!im) return "";
        opts = opts || {};
        var cap = opts.caption !== undefined ? opts.caption : im.caption;
        return (
          '<figure class="photo">' +
          '<img src="' + esc(im.file) + '" alt="' + esc(im.alt) + '" loading="lazy" />' +
          "<figcaption><span>" + tx(cap || "") + "</span>" +
          '<span class="fcredit">' + esc(im.credit) + " / " + esc(im.license) + "</span>" +
          "</figcaption></figure>"
        );
      }
      function breakHtml(slug) {
        var im = IMG[slug];

      function pqHtml(q) {

            "</cite>"

      function srcListHtml(arr) {

          arr.map(function (s) {

      function statHtml(n) {

      // drop-cap lede + interleave a pull quote after the 2nd paragraph

      // ============ shell ============
      var M = DATA.meta || {};

      function chead(s, dek) {

      if (CO.length) {

        html += '<div class="wrap">';

          html += '<div class="lbody" id="cob-' + esc(c.id) + '" style="padding-left:4px">' + coDetail(c) + "</div>";

          html += "</div>";

        html += "</div></div></section>";

      html += '<div class="wrap">';

      // ============ interactions ============

        var obs = new IntersectionObserver(function (ents) {
          ents.forEach(function (e) {
            if (e.isIntersecting) {
              var id = e.target.id;
              seen[id] = 1;
              setActive(id);
              SEC.forEach(function (s) {
                var dd = rail.querySelector('.dot[data-sec="' + s.id + '"]');
                if (dd) dd.classList.toggle("done", seen[s.id] === 1);
              });
              buildIndex();
            }
          });
        }, { rootMargin: "-40% 0px -55% 0px" });
        [].forEach.call(document.querySelectorAll("main section"), function (s) { obs.observe(s); });

        function onScroll() {
          var h = document.documentElement;
          var max = h.scrollHeight - h.clientHeight;
          document.getElementById("progress").style.width = max > 0 ? (h.scrollTop / max) * 100 + "%" : "0";
        }
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();

        function buildIndex() {
          var out = "";
          SEC.forEach(function (s) {
            var ck = seen[s.id] ? ' <span style="color:var(--accent-deep)">✓</span>' : "";
            out += '<a href="#' + s.id + '"><span class="n">' + esc(s.num) + "</span><span>" + esc(s.label) + ck + "</span></a>";
            if (s.id === "companies") {
              (DATA.companies || []).forEach(function (c) {
                out += '<a class="sub" href="#co-' + esc(c.id || c.slug) + '">' + tx(c.name) + "</a>";
              });
            }
            if (s.id === "founders") {
              (DATA.founders || []).forEach(function (f) {
                out += '<a class="sub" href="#fo-' + esc(f.id || f.slug) + '">' + tx(f.name) + "</a>";
              });
            }
          });
          document.getElementById("idxContents").innerHTML = out;
          [].forEach.call(document.querySelectorAll("#idxContents a"), function (a) {
            a.addEventListener("click", function () {
              closeIdx();
              var t = document.getElementById(a.getAttribute("href").slice(1));
              if (t && t.classList.contains("lrow")) t.classList.add("open");
            });
          });
        }
        buildIndex();

        var panel = document.getElementById("indexPanel");
        var scrim = document.getElementById("scrim");
        function openIdx() { panel.classList.add("open"); scrim.classList.add("open"); document.getElementById("closeIdx").focus(); }
        function closeIdx() { panel.classList.remove("open"); scrim.classList.remove("open"); document.getElementById("idxbtn").focus(); }
        document.getElementById("idxbtn").addEventListener("click", openIdx);
        document.getElementById("closeIdx").addEventListener("click", closeIdx);
        scrim.addEventListener("click", closeIdx);
        document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeIdx(); });
      })();
    </script>
  </body>
</html>
